<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <title>Responsive Table Form</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
      /* General Reset */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* Body Style */
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f9;
        color: #333;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 20px;
      }
.hotspot-case-grid{
display:grid;
grid-template-columns:1fr 1fr;
grid-template-rows:1fr 1fr;
width:100%;
height:100%;
position:absolute;
top:0;
left:0;
pointer-events:none;
}

.case-box{
border:1px solid rgba(0,0,0,0.2);
}

.case1{background:red;}
.case2{background:orange;}
.case3{background:yellow;}
.case4{background:green;}
      /* Heading */
      h1 {
        text-align: center;
        color: #4caf50;
        margin-bottom: 20px;
        font-size: 1.8rem;
      }

      /* Form */
      form {
        background-color: #fff;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 600px;
        padding: 20px;
      }

      /* Form Group */
      .form-group {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        margin-bottom: 15px;
      }

      label {
        font-size: 16px;
        font-weight: 600;
        color: #555;
        margin-bottom: 5px;
        flex: 1;
        min-width: 150px;
      }

      input[type="text"],
      input[type="date"] {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 16px;
        color: #555;
        flex: 2;
      }

      input[type="text"]:focus,
      input[type="date"]:focus {
        border-color: #4caf50;
        outline: none;
      }

      /* Required Fields */
      .required {
        color: red;
        font-weight: bold;
      }

      /* Buttons (Submit and Cancel) */
      .form-buttons {
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }

      input[type="submit"],
      .cancel-btn {
        width: 48%;
        padding: 12px;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
        transition: background-color 0.3s;
        text-align: center;
      }

      input[type="submit"] {
        background-color: #4caf50;
        color: white;
        border: none;
      }

      input[type="submit"]:hover {
        background-color: #45a049;
      }

      .cancel-btn {
        background-color: #f44336;
        color: white;
        border: none;
      }

      .cancel-btn:hover {
        background-color: #e53935;
      }
      /* Popup Message Style */
      .popup {
        display: none;
        padding: 20px;
        font-size: 16px;
        border-radius: 8px;
        text-align: center;
        width: 100%;
        max-width: 400px;
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
      }

      /* Green Popup for Success */
      .popup.success {
        background-color: #4caf50;
        color: white;
      }

      /* Red Popup for Failure */
      .popup.failure {
        background-color: #f44336;
        color: white;
      }
      select {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 16px;
        color: #555;
        flex: 2;
      }

      select:focus {
        border-color: #4caf50;
        outline: none;
      }

    .image-map-btn-custom {
    display: inline-block;
    padding: 8px 12px;
    background-color: #311f1f;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
    transition: background-color 0.3s ease;
    margin-right: 40px;
    
}

.image-map-btn-custom:hover {
    background-color: #0d0e0e;
}

/* Initially hide the image map container */
.image-map-container {
    display: none;
    margin-top: 5px;
    margin-bottom: 15px;
    width: 100%;
    max-width: 700px; /* Adjust as needed */
    height: 500px;
    border: 2px solid #ccc;
    border-radius: 8px;
    overflow: hidden;
}

.image-map-container iframe {
    width: 100%;
    height: 100%;
    border: none;
    overflow: auto;
    
}
.pile-container {
  text-align: center;
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    border-width: 10px;
    border-radius: 3px;
    border-color: #080808;
}

.pile-tag {
    background-color: #007bff;
    color: white;
    padding: 5px 10px;
    border-radius: 4px;
    font-size: 14px;
    display: flex;
    align-items: center;
}

.remove-x {
    margin-left: 8px;
    cursor: pointer;
    font-weight: bold;
    color: rgb(0, 0, 0);
}

.remove-x:hover {
    color: #d61111;
}


      /* Responsive Behavior */
      @media (max-width: 768px) {
        .form-group {
          flex-direction: column;
        }

        label {
          margin-bottom: 5px;
        }

        input[type="text"],
        input[type="date"] {
          width: 100%;
        }
        .form-buttons {
          flex-direction: column;
          gap: 10px;
        }

        input[type="submit"],
        .cancel-btn {
          width: 100%;
        }
      }

      /* Centered Note */
      .note {
        text-align: center;
        color: red;
        font-size: 14px;
        margin-top: 10px;
      }
      .selected-hotspot {
    background-color: rgb(161, 234, 27) !important;
    border: 2px solid black;
    opacity: 0.8;
}

    </style>
  </head>
  <body>
    <h1>Create Pile</h1>
   
     <form id="pileForm" action="/submit_pile_form" method="POST">
      <div class="form-group">
    <label for="view_type">View Type</label>
    <select id="view_type">
        <option value="normal">Normal View</option>
        <option value="case">Case Wise View</option>
    </select>
</div>
        <div class="form-group">
            <label for="area_id">Select Area <span class="required">*</span></label>
            <select id="area_id" name="area_id" required>
              <option value="" disabled selected>Select Area</option>
              <!-- Options will be populated dynamically -->
            </select>
          </div>
          
 <div class="form-group">
      <label for="table_id">Select Table <span class="required">*</span></label>
      <input type="hidden" id="table_id" name="table_id">  
      <button type="button" class="image-map-btn-custom" onclick="openImageMap()">Open Image Map</button>
      <button type="button" class="image-map-btn-custom" id="select_all_btn" onclick="toggleAllPiles()">Select All Piles</button> 
      <!-- <button type="button" class="download-btn" onclick="downloadExcel()">Download Excel</button> -->
      <!-- <button type="button" class="image-map-btn-custom" onclick="downloadHotspotImage()">Download Image</button> -->
      <button type="button" class="image-map-btn-custom" onclick="downloadHotspotPDF()">Download PDF</button>

  </div>

  <div class="form-group">
    <label for="select_all">Select All Piles</label>
    <input type="checkbox" id="select_all" onclick="toggleAllPiles()">
</div>

  <div id="pileContainer" class="pile-container"></div> <!-- Display selected hotspots
  
Hidden container for the image map -->
  <div id="imageMapContainer" class="image-map-container">
      <iframe src="/A001hotspot" id="imageMapFrame"></iframe>
  </div>

      <div class="form-group">
        <label for="location_description">Location </label>
        <input
          type="text"
          id="location_description"
          name="location_description"
          placeholder="Enter location description"
        />
      </div>

      <div class="form-group">
        <label for="gps_location">GPS Location</label>
        <input
          type="text"
          id="gps_location"
          name="gps_location"
          placeholder="Enter GPS location"
        />
      </div> -->

      <div class="form-buttons">
        <button
          type="button"
          class="cancel-btn"
          onclick="window.location.href='/dashboard'"
        >
          Cancel
        </button>
        <input type="submit" value="Submit" />
        
      </div>

      <p class="note"><span class="required">*</span> Required</p>
    </form>

    <!-- Popup message for success or failure -->
    <div id="popupMessage" class="popup"></div>

    <script>
let selectedPiles = []; // Array to store selected hotspots


/* -------------------- OPEN IMAGE MAP -------------------- */

function openImageMap() {
    let container = document.getElementById("imageMapContainer");
    let button = document.querySelector(".image-map-btn-custom");

    if (container.style.display === "none" || container.style.display === "") {
        container.style.display = "block";
        button.textContent = "Close Image Map";
    } else {
        container.style.display = "none";
        button.textContent = "Open Image Map";
    }
}


/* -------------------- SELECT PILES -------------------- */

function togglePileValue(value) {

    let pileIndex = selectedPiles.indexOf(value);

    if (pileIndex === -1) {
        selectedPiles.push(value);
    } else {
        selectedPiles.splice(pileIndex, 1);
    }

    updatePileDisplay();
}


/* -------------------- UPDATE SELECTED PILE TAGS -------------------- */

function updatePileDisplay() {

    let pileContainer = document.getElementById("pileContainer");
    pileContainer.innerHTML = "";

    selectedPiles.forEach((pile, index) => {

        let tag = document.createElement("span");

        tag.classList.add("pile-tag");

        tag.innerHTML = `${pile} <span class="remove-x" onclick="removePile(${index})">×</span>`;

        pileContainer.appendChild(tag);

    });

    document.getElementById("table_id").value = selectedPiles.join(", ");
}


/* -------------------- REMOVE PILE -------------------- */

function removePile(index) {

    let removedPile = selectedPiles[index];

    selectedPiles.splice(index, 1);

    let iframe = document.getElementById("imageMapFrame").contentWindow;

    let hotspotElement = iframe.document.querySelector(`[data-name="${removedPile}"]`);

    if (hotspotElement) {

        hotspotElement.classList.remove("selected-hotspot");

    }

    updatePileDisplay();
}


/* -------------------- SELECT ALL TABLES -------------------- */

function toggleAllPiles() {

    let selectAllButton = document.getElementById("select_all_btn");

    let iframe = document.getElementById("imageMapFrame").contentWindow;

    let hotspots = iframe.document.querySelectorAll("[data-name]");

    selectedPiles = [];

    if (selectAllButton.textContent === "Select All Piles") {

        hotspots.forEach(hotspot => {

            let pileName = hotspot.getAttribute("data-name");

            if (!selectedPiles.includes(pileName)) {

                selectedPiles.push(pileName);

                hotspot.classList.add("selected-hotspot");

            }

        });

        selectAllButton.textContent = "Deselect All Piles";

    } else {

        hotspots.forEach(hotspot => {

            hotspot.classList.remove("selected-hotspot");

        });

        selectAllButton.textContent = "Select All Piles";

    }

    updatePileDisplay();
}


/* -------------------- FORM SUBMIT -------------------- */

document.getElementById("pileForm").addEventListener("submit", function (event) {

    event.preventDefault();

    var formData = new FormData(this);

    fetch("/submit_pile_form", {
        method: "POST",
        body: formData
    })

    .then(response => response.json())

    .then(data => {

        var popupMessage = document.getElementById("popupMessage");

        popupMessage.textContent = data.message || "Error submitting the form";

        if (data.success) {

            popupMessage.classList.remove("failure");

            popupMessage.classList.add("success");

            setTimeout(function () {

                window.location.href = "dashboard";

            }, 3000);

        } else {

            popupMessage.classList.remove("success");

            popupMessage.classList.add("failure");

        }

        popupMessage.style.display = "block";

        setTimeout(function () {

            popupMessage.style.display = "none";

        }, 3000);

    })

    .catch(error => {

        var popupMessage = document.getElementById("popupMessage");

        popupMessage.classList.add("failure");

        popupMessage.textContent = "Error submitting form";

        popupMessage.style.display = "block";

    });

});


/* -------------------- LOAD AREA DROPDOWN -------------------- */

fetch("/get_area_ids")

.then(response => response.json())

.then(data => {

    const areaSelect = document.getElementById("area_id");

    data.areas.forEach(area => {

        const option = document.createElement("option");

        option.value = area.id;

        option.textContent = area.location;

        areaSelect.appendChild(option);

    });

});


/* -------------------- CASE VIEW DROPDOWN -------------------- */

document.getElementById("view_type").addEventListener("change", function(){

    const viewType = this.value;

    if(viewType === "case"){

        loadCaseData();

    }else{

        resetCaseView();

    }

});


/* -------------------- LOAD CASE DATA -------------------- */

function loadCaseData(){

    const area = document.getElementById("area_id").value;

    if(!area){

        alert("Please select area first");

        return;

    }

    fetch(`/get_case_data?area_id=${area}`)

    .then(res=>res.json())

    .then(result=>{

        if(result.success){

            applyCaseColors(result.data);

        }

    });

}


/* -------------------- APPLY CASE COLORS -------------------- */

function applyCaseColors(caseData){

let iframe=document.getElementById("imageMapFrame").contentWindow;
let doc=iframe.document;

caseData.forEach(row=>{

let tableId=row.table_id.trim();
let pileNo=parseInt(row.pile_no);
let caseName=row.assessment_case.trim();

let hotspot=doc.querySelector(`[data-name="${tableId}"]`);

if(!hotspot) return;

/* create 4 parts if not exist */

let grid=hotspot.querySelector(".hotspot-case-grid");

if(!grid){

grid=doc.createElement("div");
grid.className="hotspot-case-grid";

for(let i=1;i<=4;i++){

let part=doc.createElement("div");
part.className="case-box";
part.setAttribute("data-pile",i);

grid.appendChild(part);

}

hotspot.appendChild(grid);
}

/* find correct pile part */

let pilePart=grid.querySelector(`[data-pile="${pileNo}"]`);

if(!pilePart) return;

/* apply color */

if(caseName==="Case1") pilePart.classList.add("case1");
if(caseName==="Case2") pilePart.classList.add("case2");
if(caseName==="Case3") pilePart.classList.add("case3");
if(caseName==="Case4") pilePart.classList.add("case4");

});
}

/* -------------------- RESET CASE VIEW -------------------- */

function resetCaseView(){

    let iframe = document.getElementById("imageMapFrame").contentWindow;

    let doc = iframe.document;

    let grids = doc.querySelectorAll(".hotspot-case-grid");

    grids.forEach(g=>g.remove());

}


/* -------------------- AREA CHANGE -------------------- */

document.getElementById("area_id").addEventListener("change", function () {

    const selectedValue = this.value.trim();

    const iframe = document.getElementById("imageMapFrame");

    if (selectedValue) {

        const hotspotURL = `/${selectedValue}remedyhotspot`;

        iframe.src = hotspotURL;

        document.getElementById("imageMapContainer").style.display = "block";

        if(document.getElementById("view_type").value === "case"){

            setTimeout(()=>{

                loadCaseData();

            },800);

        }

    }

});


/* -------------------- DOWNLOAD IMAGE -------------------- */
async function downloadHotspotPDF(){

const iframe=document.getElementById("imageMapFrame");
const iframeDoc=iframe.contentDocument || iframe.contentWindow.document;

const mapContainer=iframeDoc.querySelector(".container");

if(typeof html2canvas==="undefined"){

await new Promise(resolve=>{
const script=document.createElement("script");
script.src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
script.onload=resolve;
document.head.appendChild(script);
});

}

html2canvas(mapContainer,{
useCORS:true,
allowTaint:true,
scale:2
})
.then(canvas=>{

const imgData=canvas.toDataURL("image/png");

const { jsPDF } = window.jspdf;

const pdf=new jsPDF("landscape","mm","a4");

let imgWidth=280;
let imgHeight=(canvas.height*imgWidth)/canvas.width;

pdf.addImage(imgData,"PNG",10,10,imgWidth,imgHeight);

pdf.save("Hotspot_Map.pdf");

});

}
    </script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.19.3/dist/xlsx.full.min.js"></script>
